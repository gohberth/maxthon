<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Shaka DRM Player</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: black;
    }
  </style>
</head>
<body>

<video id="video" autoplay muted controls playsinline></video>

<script>
  async function initPlayer() {
    const video = document.getElementById('video');
    const player = new shaka.Player(video);

    player.configure({
      drm: {
        servers: {
          'com.widevine.alpha': 'https://aspaltvpasti.top/11111/19584.drm?dev_kaki_09&t=1776519023&uip=182.9.33.244&h=ef8a5aca828c0910bb3625e76a43d046b05948cf71ced3d60adc419ecc82f88f'
        }
      }
    });

    try {
      await player.load('https://aspaltvpasti.top/11111/19584.mpd?dev_kaki_09&t=1776519023&uip=182.9.33.244&h=ef8a5aca828c0910bb3625e76a43d046b05948cf71ced3d60adc419ecc82f88f');
      console.log('Video berhasil dimuat');
    } catch (e) {
      console.error('Error load video:', e);
    }
  }

  function openFullscreen() {
    const elem = document.documentElement;

    if (elem.requestFullscreen) {
      elem.requestFullscreen();
    }
  }

  // 🔊 Unmute otomatis saat ada interaksi pertama
  function enableSound() {
    const video = document.getElementById('video');
    video.muted = false;
    video.volume = 1;
    video.play();
  }

  window.onload = () => {
    initPlayer();
    openFullscreen();

    // tangkap semua interaksi pertama (klik / tap / scroll)
    ['click','touchstart','scroll'].forEach(event => {
      document.addEventListener(event, enableSound, { once: true });
    });
  };
</script>

</body>
</html>
