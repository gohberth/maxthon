<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HLS Player</title>

  <!-- hls.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body {
      margin: 0;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }

    .player-container {
      width: 90%;
      max-width: 900px;
      background: #020617;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    video {
      width: 100%;
      height: auto;
      background: black;
    }

    .controls {
      padding: 10px;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="player-container">
    <video id="video" controls autoplay muted></video>
    <!-- <div class="controls">HLS Stream Player</div> -->
  </div>

  <script>
    const video = document.getElementById('video');

    // GANTI URL HLS (.m3u8)
    const streamURL = "https://ott-balancer.tvri.go.id/live/eds/SportHD/hls/SportHD.m3u8";

    if (Hls.isSupported()) {
      const hls = new Hls({
        liveSyncDurationCount: 3
      });

      hls.loadSource(streamURL);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        video.play();
      });

      // Auto reconnect kalau error
      hls.on(Hls.Events.ERROR, function (event, data) {
        if (data.fatal) {
          console.log("Error fatal, reload stream...");
          hls.destroy();

          const newHls = new Hls();
          newHls.loadSource(streamURL);
          newHls.attachMedia(video);
        }
      });

    } 
    // Safari / iOS (native HLS support)
    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = streamURL;
      video.addEventListener('loadedmetadata', () => {
        video.play();
      });
    } 
    else {
      alert("Browser tidak mendukung HLS.");
    }
  </script>

</body>
</html>
