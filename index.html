<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streaming TV</title>

<!-- HLS -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<!-- DASH -->
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

<style>
:root {
    --bg:#0f172a;
    --card:#020617;
    --accent:#49b9e6;
    --text:#e5e7eb;
    --muted:#94a3b8;
}
*{box-sizing:border-box}
body{
margin:0;
background:var(--bg);
font-family:system-ui, sans-serif;
color:var(--text);
}
.container{
display:flex;
height:100vh;
gap:12px;
padding:20px;
}
.player-area{
width:80%;
background:var(--card);
border-radius:14px;
padding:12px;
display:flex;
flex-direction:column;
box-shadow:0 10px 40px rgba(0,0,0,.6);
}
video{
width:100%;
height:100%;
border-radius:10px;
background:black;
}
.player-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
}
.player-title{
font-weight:600;
}
select{
background:#020617;
color:var(--text);
border:1px solid #1e293b;
border-radius:8px;
padding:6px 10px;
}
.sidebar{
width:20%;
background:var(--card);
border-radius:14px;
padding:15px;
overflow-y:auto;
}
.sidebar h3{
margin:6px 0 12px;
font-size:14px;
color:var(--muted);
}
.channel-btn{
width:100%;
padding:12px 14px;
margin-bottom:8px;
border-radius:10px;
border:1px solid #1e293b;
background:#020617;
color:var(--text);
font-size:14px;
text-align:left;
cursor:pointer;
transition:all .25s ease;
}
.channel-btn:hover{
background:#0f172a;
border-color:var(--accent);
transform:translateX(4px);
}
.channel-btn.active{
background:#0f172a;
border-color:var(--accent);
font-weight:600;
}
@media(max-width:900px){
html, body{
height:100%;
overflow:hidden;
}
.container{
flex-direction:column;
height:100vh;
overflow:hidden;
}
.player-area{
width:100%;
height:auto;
flex-shrink:0;
}
.sidebar{
width:100%;
height:auto;
overflow-y:auto;
margin-bottom:50px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="player-area">

<div class="player-header">
<div class="player-title" id="channelTitle">LIVE STREAMING</div>
<select id="qualitySelect"></select>
</div>

<video id="video" controls autoplay></video>

</div>

<div class="sidebar">
<h3>Channel List</h3>
<div id="channelList"></div>
</div>

</div>

<script>

let video=document.getElementById('video');
let qualitySelect=document.getElementById('qualitySelect');
let channelTitle=document.getElementById('channelTitle');

let hls;
let dashPlayer;
let currentUrl='';

// ===== PLAYER =====
function initPlayer(url){

currentUrl=url;

// reset
if(hls){
hls.destroy();
hls=null;
}

if(dashPlayer){
dashPlayer.reset();
dashPlayer=null;
}

// HLS
if(url.includes('.m3u8')){

if(Hls.isSupported()){

hls=new Hls({
enableWorker:true,
lowLatencyMode:true,
maxBufferLength:120
});

hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{

const levels=hls.levels
.map((l,i)=>({...l,index:i}))
.filter(l=>l.height<=720);

qualitySelect.innerHTML='';

levels.forEach(l=>{
qualitySelect.innerHTML+=`<option value="${l.index}">${l.height}p</option>`;
});

if(levels.length){
let best=levels.reduce((a,b)=>a.height>b.height?a:b);
hls.currentLevel=best.index;
qualitySelect.value=best.index;
}

video.play();

});

}

// DASH
}else if(url.includes('.mpd')){

dashPlayer = dashjs.MediaPlayer().create();
dashPlayer.initialize(video, url, true);

qualitySelect.innerHTML='<option>Auto</option>';

// NORMAL
}else{
video.src=url;
video.play();
}

}

// change quality
qualitySelect.addEventListener('change',function(){
if(hls){
hls.currentLevel=parseInt(this.value);
}
});

// load channel
function loadChannel(el,url,title){

document.querySelectorAll('.channel-btn')
.forEach(c=>c.classList.remove('active'));

el.classList.add('active');

channelTitle.innerText=title;

initPlayer(url);

}

// ===== M3U CONFIG =====
const M3U_URL = 'http://kendutv.diskon.cloud/liveevent/rakhoitvcache.m3u';

// load M3U
async function loadM3U(){
try{
const res = await fetch(M3U_URL);
const text = await res.text();
parseM3U(text);
}catch(err){
console.error('Gagal load M3U:', err);
}
}

// parse M3U
function parseM3U(data){

const lines = data.split('\n');
const container = document.getElementById('channelList');

container.innerHTML = '';

let currentName = '';

lines.forEach(line=>{

line = line.trim();

if(line.startsWith('#EXTINF')){
const parts = line.split(',');
currentName = parts[1] || 'Unknown';
}

else if(line && !line.startsWith('#')){

const btn = document.createElement('button');
btn.className = 'channel-btn';
btn.innerText = currentName;

btn.onclick = function(){
loadChannel(btn, line, currentName);
};

container.appendChild(btn);

}
});

}

// start
loadM3U();

</script>

</body>
</html>
